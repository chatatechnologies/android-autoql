<script>
function getFirst10(string) {
  var newString = '';
  if (string.length < 11) {
    newString = string
  } else {
    newString = string.substring(0, 10) + '...';
  }
  return newString;
}

function digitsCount(n) {
	var count = 0;
	if ( n >= 1) ++count;

	while (n/ 10 >= 1) {
		n /= 10;
		++count;
	}
	return count;
}

function angle(d) {
	var a = (d.startAngle + d.endAngle) * 90 / Math.PI - 90;
	return a > 90 ? a - 180 : a;
}

function isHorizontal(type) {
  return (type == TypeEnum.BAR);
}

function clearSvg() {
	//remove svg
	d3.select('svg').remove();
}

function updateSize() {
  if (data.length < 8) {
    width = $(window).width() - margin.left - margin.right;
  } else {
    var width1 = $(window).width() - margin.left - margin.right;
    width = (width1 / 8) * data.length;
  }
  height = $(window).height() - margin.top - margin.bottom;
  radius = Math.min(width, height) / 2;
}

function updateData(tmpChart, isReload) {
	if (typeChart != tmpChart || isReload) {
	  typeChart = tmpChart;
  }

  updateSize();
  if (tmpChart == TypeEnum.TABLE) {
    $("svg").hide(0);
    $("table").show(0);
  } else {
    $("table").hide(0);
    clearSvg();
    switch(typeChart) {
    case TypeEnum.COLUMN:
      {
        //region define columns number
        var nColumns = 0
        data.map(function(a1) {
          var keys = Object.keys(a1);
          nColumns = keys.length
        });
        //endregion
        if (nColumns == 2) {
          setColumn()
        } else {
          setMultiSeries()
        }
      }
      break;
    case TypeEnum.BAR:
      {
        setBar();
      }
      break;
    case TypeEnum.LINE:
      setLine();
      break;
    case TypeEnum.PIE:
      setDonut();
      break;
    }
  }	
}

function drillDown(content) {
	try {
		Android.boundMethod(content);
	} catch(err) {
		console.log("Good content: " + content);
	};
}

//region not mutable
const TypeEnum = Object.freeze({
  "TABLE": 1,
  "PIVOT": 2,
  "COLUMN": 3,
  "BAR": 4,
  "LINE": 5,
  "PIE": 6,
  "HEATMAP": 7,
  "BUBBLE": 8,
  "STACKED_BAR": 9,
  "STACKED_COLUMN": 10,
  "STACKED_AREA": 11,
  "UNKNOWN": 0});

var colorPie = ["#355c7d", "#6c5b7b", "#c06c84", "#f67280", "#f8b195"];
var colorBi = ['#355c7d'];//Main color for bars

var axisX = 'Month';
var axisY = 'Total Revenue';

//Main data
// var data = [{name: "Nov 2019", value: 106630.75},
// {name: "Oct 2019", value: 104254.00},
// {name: "Sep 2019", value: 57326.75},
// {name: "Aug 2019", value: 122868.00},
// {name: "May 2019", value: 100500.00}]
var data = [
  {name: 'Jun 2, 2021', value: 12, normal: 1, stress: 13},
  {name: 'Jan 14, 2021_1', value: 6, normal: 6, stress: 33},
  {name: 'Jan 14, 2021_2', value: 11, normal: 28, stress: 12},
  {name: 'Jan 13, 2021_1', value: 19, normal: 6, stress: 1},
  {name: 'Jan 13, 2021_2', value: 1, normal: 2, stress: 1}
]

var categoriesX = ["Nov 2019", "Oct 2019", "Sep 2019", "Aug 2019", "May 2019"]
var drillTableY = [106630.75, 104254.00, 57326.75, 122868.00, 100500.00];
var drillX = ["2019-11", "2019-10", "2019-09", "2019-08", "2019-05"]
var limitName = 0;
var maxValue = 122868;
var minValue = 0;
//endregion

//REGION max letters in name
for (const item in data) {
  var value = data[item].name.length;
  if (limitName < value) {
    limitName = value;
    if (limitName > 10) {
      limitName = 110;
      break;
    } else {
      limitName *= 10;
    }
  }
}
//ENDREGION

//REGION get max value
for (const item in data) {
  var value = data[item].value;
  if (maxValue < value) {
    maxValue = value;
  }
}
//ENDREGION

//The left margin makes the left border visible
var typeChart = TypeEnum.COLUMN;
var digits = digitsCount(maxValue);
var _plusSingle = digits == 1 ? 10 : 0;
var _maxValue = (digits * 8) + 35 + _plusSingle;
var _bottom = typeChart == isHorizontal() ? _maxValue : limitName;
var _left = typeChart == isHorizontal() ? limitName : _maxValue;
//width dynamic, height dynamic
var margin = {
  top: 20,
  right: 20,
  bottom: _bottom,
  left: _left
};
var width = 0;
var height = 0;

//Start with column
function setMultiSeries() {
  // append the svg object to the body of the page
  var svg = d3.select('body').append('svg')
    .attr('width', width + margin.bottom + margin.right)
    .attr('height', height + margin.top + margin.left)
  .append('g')
    .attr('transform', `translate(${margin.left}, ${margin.top})`);

  var keys1 = Object.keys(data[0])
  const subgroups = keys1.slice(1)

  // List of groups = species here = value of the first column called group -> I show them on the X axis
  const groups = data.map(d => d.name)
  console.log(groups)

  // Add X axis
  const x = d3.scaleBand()
    .domain(groups)
    .range([0, width])
    .padding([0.2])
  svg.append("g")
    .attr('transform', `translate(0, ${height})`)
    .call(
      d3.axisBottom(x)
        .tickSize(0)
        .tickFormat(x => `${x.split('_')[0]}`)
    )

  // Add Y axis
  const y = d3.scaleLinear()
    .domain([0, 40])
    .range([ height, 0 ]);
  svg.append('g')
    .call(d3.axisLeft(y));

  // Another scale for subgroup position?
  const xSubgroup = d3.scaleBand()
    .domain(subgroups)
    .range([0, x.bandwidth()])
    .padding([0.05])

  // color palette = one color per subgroup
  const color = d3.scaleOrdinal()
    .domain(subgroups)
    .range(colorPie)

  // Show the bars
  svg.append('g')
    .selectAll('g')
    // Enter in data = loop group per group
    .data(data)
    .join('g')
      .attr('transform', d => `translate(${x(d.name)}, 0)`)
    .selectAll('rect')
    .data(function(d) { return subgroups.map(function(key) { return {key: key, value: d[key]}; }); })
    .join('rect')
      .attr('x', d => xSubgroup(d.key))
      .attr('y', d => y(d.value))
      .attr('width', xSubgroup.bandwidth())
      .attr('height', d => height - y(d.value))
      .attr('fill', d => color(d.key));
}

function setBar() {
	var svg = d3.select('body').append('svg')
		.attr('width', width + margin.bottom + margin.right)
		.attr('height', height + margin.top + margin.left)
		.append('g')
		.attr('transform', 'translate(' + margin.bottom + ',' + margin.top + ')');

	var x = d3.scaleBand()
		.range([height, 0])
		.padding(0.1);
	var y = d3.scaleLinear()
		.range([0, width]);

	x.domain(data.map(function(d) { return d.name; }));
	y.domain([0, d3.max(data, function(d) { return d.value; })]);

	svg.selectAll()
		.data(data)
		.enter().append('rect')
		.style('fill', function(d) {
			return scaleColorBi(d.value);
		})
		.attr('x', function(d) { return x(d.value); })
		.attr('width', function(d) { return y(d.value); })
		.attr('y', function(d) { return x(d.name); })
		.attr('height', x.bandwidth())
		.on('click', function(_, d) {
			var index = data.indexOf(d);
      var value = drillX[index];
      drillDown(value);
		});

	svg.append('g')
		.attr('transform', 'translate(0,' + height + ')')
		.call(
			d3.axisBottom(y)
			.tickSize(0)
			//format data for each number on Y axis
			.tickFormat(x => `${fformat(x)}`))
		.call(
			g => g.selectAll('.tick line')
			.clone()
			.attr('stroke-opacity', 0.1)
			.attr('y2', -height))
		//Remove line on domain for X axis
		.call(g => g.select('.domain').remove())
		.selectAll('text')
		.attr('transform', 'translate(10,10)rotate(-45)')
		.attr('fill', '#909090');

	svg.append('g')
		.call(
			d3.axisLeft(x)
      .tickFormat(x =>`${getFirst10(x)}`))
		//region set opacity for each tick item
		.call(g => g.selectAll('.tick line')
		.attr('opacity', 0.2))
		//endregion
		//Remove line on domain for Y axis
		.call(g => g.select('.domain').remove())
		.selectAll('text')
		.attr('transform', 'translate(-10,-25)rotate(-45)')
		.attr('fill', '#909090');

	//Add X axis label:
	svg.append('text')
		.attr('text-anchor', 'end')
		.style('font-size', 16)
		.attr('x', (width / 2) + margin.top)//for center
		.attr('y', height + margin.left - 10)//for set on bottom with -10
		.attr('fill', '#808080')
		.text(axisY);

	//Y axis label:
	svg.append('text')
		.attr('text-anchor', 'end')
		.style('font-size', 16)
		.attr('transform', 'rotate(-90)')
		.attr('y', -margin.bottom + 20)
		.attr('x', margin.top + (-height / 2))//center Y axis title
		.attr('fill', '#808080')
		.text(axisX);
	}

  var svg = d3.select('body').append('svg')
    .attr('width', width + margin.left + margin.right)

//the X DATA for axis bar
svg.append('g')
  .attr('transform', 'translate(0,' + height + ')')
  .call(
    d3.axisBottom(x)
    .tickFormat(x =>`${getFirst10(x)}`))
  //Remove line on domain for X axis

svg.append('g')
  //Format numbers on axis
  .call(

    .tickFormat(x => `${fformat(x)}`))

  .call(
    g => g.selectAll('.tick line')

  //endregion
  //Remove line on domain for Y axis
  .call(g => g.select('.domain').remove())

	.attr('transform', 'translate(0,0)rotate(0)')
  .attr('fill', '#909090');

//Add X axis label:
svg.append('text')
  .attr('text-anchor', 'end')
  .style('font-size', 16)
  .attr('x', (width / 2) + margin.top)//for center
  .attr('y', height + margin.bottom - 10)//for set on bottom with -10
  .attr('fill', '#808080')
  .text(axisX);

//Y axis label:
svg.append('text')
  .attr('text-anchor', 'end')
  .style('font-size', 16)
  .attr('transform', 'rotate(-90)')
  .attr('y', -margin.left + 20)
  .attr('x', margin.top + (-height / 2))//center Y axis title
  .attr('fill', '#808080')
  .text(axisY);
}

function setLine() {
  var svg = d3.select('body').append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom)
    .append('g')
    .attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

    // Initialise a X axis:
    var xScaleBand = d3.scaleBand().range([0, width]).padding(1);

    // Initialize an Y axis
    var yScale = d3.scaleLinear().range([height, 0]);

    // create the X axis
    xScaleBand.domain(data.map(function(d) { return d.name; }));
    // create the Y axis
    yScale.domain([0, d3.max(data, function(d) { return d.value }) ]);

    svg.append("g")
      .attr("transform", "translate(0," + height + ")")
      .call(
        d3.axisBottom(xScaleBand)
        .tickFormat(x =>`${getFirst10(x)}`))
      //Remove line on domain for X axis
      .call(g => g.select('.domain').remove())
			//region set opacity for each tick item
			.call(g => g.selectAll('.tick line')
      .attr('opacity', 0.2))
      .selectAll('text')
      //rotate text
      .attr('transform', 'translate(10,10)rotate(-45)')
      //Set color each item on X axis
      .attr('fill', '#909090')
      .style('text-anchor', 'end');

    svg.append("g")
      .call(
        d3.axisLeft(yScale)
        .tickSize(0)
        .tickFormat(x => `${fformat(x)}`))
      //region set lines by each value for y axis
      .call(
        g => g.selectAll('.tick line')
        .clone()
        .attr('stroke-opacity', 0.1)
        .attr('x2', width)
      )
      //Remove line on domain for Y axis
      .call(g => g.select('.domain').remove())
      .selectAll('text')
      .attr('fill', '#909090');

    // Updata the line
    svg.selectAll()
      .data([data], function(d){ return d.value })
      .enter()
      .append("path")
      .attr("d", d3.line()
        .x(function(d) { return xScaleBand(d.name); })
        .y(function(d) { return yScale(d.value); })
        //.curve(d3.curveMonotoneX)
      )
      .attr("stroke", colorBi)
      .attr("stroke-width", 1.5)
      .attr("fill", "none");

    svg.selectAll()
      .data(data)
      .enter()
      .append("circle")
      .attr("cx", function(d) { return xScaleBand(d.name) })
      .attr("cy", function(d) { return yScale(d.value) })
      .attr("r", 4)
      .attr("fill", colorBi)
      .on('click', function(_, d) {
	      var index = data.indexOf(d);
	      var value = drillX[index];
	      drillDown(value);
	    });
			
		//Add X axis label:
    svg.append('text')
      .attr('text-anchor', 'end')
      .style('font-size', 16)
      .attr('x', (width / 2) + margin.top)//for center
      .attr('y', height + margin.bottom - 10)//for set on bottom with -10
      .attr('fill', '#808080')
      .text(axisX);

    //Y axis label:
    svg.append('text')
      .attr('text-anchor', 'end')
      .style('font-size', 16)
      .attr('transform', 'rotate(-90)')
      .attr('y', -margin.left + 20)
      .attr('x', margin.top + (-height / 2))//center Y axis title
      .attr('fill', '#808080')
      .text(axisY);
	}

//REGION DONUT
function setDonut() {
  var arc = d3.arc()
    .outerRadius(radius)
		.innerRadius(radius * 0.5);

	var pie = d3.pie()
		.sort(null)
		.value(function(d) {
			return d.value;
		});
		
	var maxWidth = width + margin.left + margin.right;
  var maxHeight = height + margin.top + margin.bottom;

	var svg = d3.select('body').append('svg')
    .attr('width', maxWidth)
    .attr('height', maxHeight)
		.append('g')
		.attr('transform', 'translate(' + maxWidth * 0.65 + ',' + maxHeight * 0.65 + ')');

	var g = svg.selectAll('.arc')
		.data(pie(data))
		.enter().append('g');

	var scaleColorPie = d3.scaleOrdinal().domain(data).range(colorPie);

	g.append('path')
		.attr('d', arc)
		.style('fill', function(_, i) {
			return colorPie[i];
		})
		.on('click', function(_, i) {
			var index = i.index;
			var value = drillX[index];
			drillDown(value);
		});
		
	var factorBack = -(maxHeight / 2) - 30;
		
  for (const index in data) {
    var item = data[index];
    svg.append('text')
    .style('font-size', 12)
    .attr('x', -(maxWidth / 2) - 20)
    .attr('y', factorBack)
    .attr('fill', '#808080')
    .text(item.name + ': ' + item.value);
		
    svg.append('circle')
      .attr("cx", -(maxWidth / 2) - 30)
      .attr("cy", factorBack - 5)
      .attr("r", 5)
      .attr("fill", colorPie[index])
    factorBack += 20;
  }
}
//END DONUT

		$('#idTableBasic tfoot th').each(function () {
    var indexInput = $(this).index();
    var title = $(this).text();
    var idInput = title.split(' ').join('_') + '_Basic';
	$(this).html(
        '<input id=' + idInput +
        ' type="text" placeholder="filter column..."/>');

    $("#" + idInput).on('input', function () {
        var filter = $(this).val().toUpperCase();
        var table = document.getElementById("idTableBasic");
        var tr = table.getElementsByTagName("tr");

        for (index = 0; index < tr.length; index++) {
            td = tr[index].getElementsByTagName("td")[indexInput];
            if (td) {
                txtValue = td.textContent || td.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    tr[index].style.display = "";
                } else {
                    tr[index].style.display = "none";
                }
            }
        }
    });
});

var scaleColorBi = d3.scaleOrdinal().range(colorBi);

//region locale settings
var locale = d3.formatLocale({
  "decimal": ",",//","
