<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://d3js.org/d3.v6.js"></script>
  <title></title>
</head>
<body>
  <script src="https://d3js.org/d3-scale-chromatic.v1.min.js"></script>
  <script>
// set the dimensions and margins of the graph
var margin = {top: 10, right: 100, bottom: 30, left: 30},
    width = 460 - margin.left - margin.right,
    height = 400 - margin.top - margin.bottom;

// append the svg object to the body of the page
var svg = d3.select("body")
  .append("svg")
    .attr("width", width + margin.left + margin.right)
    .attr("height", height + margin.top + margin.bottom)
  .append("g")
    .attr("transform",
          "translate(" + margin.left + "," + margin.top + ")");

  var data = [
{name: 'Jun 2, 2021_1', time_0: 0.0, time_1: 0.0, time_2: 100.0, time_3: 100.0, time_4: 100.0},
{name: 'Jan 14, 2021_1', time_0: 0.0, time_1: 0.0, time_2: 240.0, time_3: 20.0, time_4: 240.0},
{name: 'Jan 14, 2021_2', time_0: 0.0, time_1: 0.0, time_2: 840.0, time_3: 80.0, time_4: 3360.0},
{name: 'Jan 13, 2021_1', time_0: 0.0, time_1: 0.0, time_2: 600.0, time_3: 60.0, time_4: 1800.0},
{name: 'Jan 13, 2021_2', time_0: 0.0, time_1: 0.0, time_2: 600.0, time_3: 60.0, time_4: 1800.0}];

//time is the ordinal number
//time 0, 1, ... , n are name in data1
var data1 = [
  {time: 'Jun 2, 2021_1', time_0: 0.0, time_1: 0.0, time_2: 100.0, time_3: 100.0, time_4: 100.0},
  {time: 'Jan 14, 2021_1', time_0: 0.0, time_1: 0.0, time_2: 240.0, time_3: 20.0, time_4: 240.0},
  {time: 'Jan 14, 2021_2', time_0: 0.0, time_1: 0.0, time_2: 840.0, time_3: 80.0, time_4: 3360.0},
  {time: 'Jan 13, 2021_1', time_0: 0.0, time_1: 0.0, time_2: 600.0, time_3: 60.0, time_4: 1800.0},
  {time: 'Jan 13, 2021_2', time_0: 0.0, time_1: 0.0, time_2: 600.0, time_3: 60.0, time_4: 1800.0}
]

var keys1 = Object.keys(data[0]);
const allGroups = keys1.slice(1);

  // Reformat the data: we need an array of arrays of {x, y} tuples
  var dataReady = allGroups.map( function(grpName) { // .map allows to do something for each element of the list
    return {
      name: grpName,
      values: data.map(function(d) {
        return {subname: d.name, value: +d[grpName]};
      })
    };
  });

  // A color scale: one color for each group
  var colorPie = ["#355c7d", "#6c5b7b", "#c06c84", "#f67280", "#f8b195"];
  var myColor = d3.scaleOrdinal()
    .domain(allGroups)
    .range(colorPie);

  // Add X axis --> it is a date format
  var x = d3.scaleBand()
    .domain(data.map(function(d) { return d.name; }))
    .range([0, width])
    .padding(1);
  svg.append("g")
    .attr('transform', `translate(0,${height})`)
    .call(
      d3.axisBottom(x)
      .tickFormat(x =>`${x.split('_')[0]}`)
    )
    //Remove line on domain for X axis
    .call(g => g.select('.domain').remove())
    //region set opacity for each tick item
    .call(
      g => g.selectAll('.tick line')
      .attr('opacity', 0.2))
    .selectAll('text')
    //rotate text
    .attr('transform', 'translate(10,10)rotate(-45)')
    //Set color each item on X axis
    .attr('fill', '#909090')
    .style('text-anchor', 'end');

  // Add Y axis
  var y = d3.scaleLinear()
    .domain([0, 3360.0])//maxValue is here
    .range([height, 0]);
  svg.append("g")
    .call(
      d3.axisLeft(y)
      .tickSize(0)
      .tickFormat(x => `${x}`)
    )
    .call(
      g => g.selectAll('.tick line')
      .clone()
      .attr('stroke-opacity', 0.1)
      .attr('x2', width)
    )
    //Remove line on domain for Y axis
    .call(g => g.select('.domain').remove())
    .selectAll('text')
    .attr('fill', '#909090');

  // Add the lines
  var line = d3.line()
    .x(function(d) { return x(d.subname) })
    .y(function(d) { return y(d.value) });
  svg.selectAll("myLines")
    .data(dataReady)
    .enter()
    .append("path")
      .attr("d", function(d){ return line(d.values) } )
      .attr("stroke", function(d){ return myColor(d.name) })
      .style("stroke-width", 1)
      .style("fill", "none");

  // Add the points
  svg
    // First we need to enter in a group
    .selectAll()
    .data(dataReady)
    .enter()
      .append('g')
      .style("fill", function(d){ return myColor(d.name) })
    // Second we need to enter in the 'values' part of this group
    .selectAll()
    .data(function(d){ return d.values })
    .enter()
    .append("circle")
      .attr('id', function(_, i){ return 'item_' + i;})
      .attr("cx", function(d) { return x(d.subname) } )
      .attr("cy", function(d) { return y(d.value) } )
      .attr("r", 4)
      .attr("stroke", "white")
      .on('click', function () {
        var idParent = this.id;
        var aData = idParent.split('_');
        if (aData.length > 0)
        {
          var index = aData[1];
          //var value = `${drillX[index]}_${index}`;
          console.log(index);
        }
      });
  </script>
</body>
</html>
